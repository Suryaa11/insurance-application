services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/insurance_management
      JWT_ACCESS_SECRET: replace-me
      JWT_REFRESH_SECRET: replace-me
      CLIENT_ORIGIN: http://localhost:3000
      UPLOAD_DIR: uploads
      LOG_LEVEL: info
    depends_on:
      - mongodb

  frontend:
  build:
    context: .
    dockerfile: frontend/Dockerfile
    args:
      VITE_API_URL: http://4.240.111.186:5000
  ports:
    - "3000:80"

volumes:
  mongo_data:
