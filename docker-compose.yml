services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend/.env:/app/backend/.env:ro
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb+srv://mongodb:Admin123@mongodbapp.global.mongocluster.cosmos.azure.com/?tls=true&authMechanism=SCRAM-SHA-256&retrywrites=false&maxIdleTimeMS=120000
      JWT_ACCESS_SECRET: replace-me
      JWT_REFRESH_SECRET: replace-me
      CLIENT_ORIGIN: http://4.240.111.186:3000
      UPLOAD_DIR: uploads
      LOG_LEVEL: info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://4.240.111.186:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
